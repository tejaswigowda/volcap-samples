<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SMPL Animation Viewer</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #1a1a1a;
            color: #e0e0e0;
            overflow: hidden;
        }
        #container {
            display: flex;
            height: 100vh;
            gap: 10px;
            padding: 10px;
        }
        #viewer {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: #2d2d2d;
            border-radius: 8px;
            overflow: hidden;
        }
        canvas {
            flex: 1;
            background: linear-gradient(135deg, #1e1e1e 0%, #2d2d2d 100%);
        }
        #controls {
            padding: 15px;
            background: #222;
            border-top: 1px solid #444;
            display: flex;
            flex-wrap: wrap;
            gap: 15px;
            align-items: center;
        }
        .control-group {
            display: flex;
            align-items: center;
            gap: 8px;
        }
        label {
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #aaa;
            min-width: 100px;
        }
        select, input {
            padding: 6px 12px;
            background: #333;
            color: #e0e0e0;
            border: 1px solid #555;
            border-radius: 4px;
            cursor: pointer;
            font-size: 12px;
        }
        select:hover {
            background: #444;
        }
        input[type="range"] {
            min-width: 200px;
            cursor: pointer;
        }
        button {
            padding: 8px 16px;
            background: #0066cc;
            color: #fff;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.2s;
        }
        button:hover {
            background: #0080ff;
        }
        #stats {
            font-size: 12px;
            color: #aaa;
            padding: 0 15px;
        }
        #sidebar {
            width: 300px;
            background: #2d2d2d;
            border-radius: 8px;
            padding: 15px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }
        #videoContainer {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        #syncVideo {
            width: 100%;
            border-radius: 4px;
            background: #1a1a1a;
            cursor: pointer;
        }
        #videoLabel {
            color: #0066cc;
            font-size: 12px;
            text-transform: uppercase;
            font-weight: 600;
        }
        #sidebar h3 {
            color: #0066cc;
            font-size: 14px;
            text-transform: uppercase;
            margin-bottom: 10px;
        }
        .person-item {
            padding: 8px 12px;
            background: #333;
            border: 1px solid #555;
            border-radius: 4px;
            cursor: pointer;
            transition: all 0.2s;
            font-size: 12px;
        }
        .person-item:hover {
            background: #444;
            border-color: #777;
        }
        .person-item.active {
            background: #0066cc;
            border-color: #0066cc;
            font-weight: 600;
        }
        #loadingOverlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 9999;
            flex-direction: column;
            gap: 20px;
        }
        #loadingOverlay.hidden {
            display: none;
        }
        #loadingSpinner {
            width: 50px;
            height: 50px;
            border: 4px solid #444;
            border-top-color: #0066cc;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        #loadingStatus {
            color: #0066cc;
            font-size: 14px;
            text-align: center;
        }
    </style>
</head>
<body>
    <div id="container">
        <div id="viewer">
            <canvas id="canvas"></canvas>
            <div id="stats"></div>
            <div id="controls">
                <div class="control-group">
                    <button id="playBtn" onclick="togglePlayPause()">▶ Play</button>
                </div>
                <div class="control-group">
                    <label>Frame:</label>
                    <input type="range" id="frameSlider" min="0" max="100" value="0" onchange="setFrame(this.value)">
                    <span id="frameLabel">0/0</span>
                </div>
                <div class="control-group">
                    <label>Speed:</label>
                    <input type="range" id="speedSlider" min="0.1" max="2.0" step="0.1" value=".2" onchange="setSpeed(this.value)">
                    <span id="speedLabel">.2x</span>
                </div>
                <div class="control-group">
                    <button onclick="resetCamera()">Reset Camera</button>
                </div>
            </div>
        </div>
        <div id="sidebar">
            <div id="videoContainer">
                <div id="videoLabel">Sync Video</div>
                <video id="syncVideo" nocontrols preload="auto">
                    <source src="./cartwheel.mp4" type="video/mp4">
                    Your browser does not support the video tag.
                </video>
            </div>
            <h3>Persons</h3>
            <div id="personList"></div>
        </div>
    </div>

    <div id="loadingOverlay" class="hidden">
        <div id="loadingSpinner"></div>
        <div id="loadingStatus">Preloading animation...</div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/OBJLoader.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>

    <script>
        let scene, camera, renderer, controls;
        let currentPerson = null;
        let currentFrameIndex = 0;
        let isPlaying = false;
        let playbackSpeed = 1.0;
        let frameTime = 0.033521;
        let deltaTime = 0;
        let plyCaches = {};
        let personFrameCounts = {};
        let currentMesh = null;
        let isSyncingFromVideo = false;
        let frameMetadata = {};
        let animationMetadata = null;
        let objLoader = new THREE.OBJLoader();
        let loadingQueue = new Set();
        let preloadedFrames = new Set();
        const MAX_CONCURRENT_LOADS = 8;
        const PRELOAD_DISTANCE = 5;
        let isPreloadingAll = false;

        const persons = ["person_01"];

        function initThreeJS() {
            // Setup scene
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x1a1a1a);

            // Setup camera
            const viewerDiv = document.getElementById('viewer');
            const width = viewerDiv.clientWidth;
            const height = viewerDiv.clientHeight - 100;
            camera = new THREE.PerspectiveCamera(75, width / height, 0.1, 1000);
            camera.position.set(0, 1, 2);
            camera.lookAt(0, 1, 0);

            // Setup renderer
            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(width, height);
            renderer.setPixelRatio(window.devicePixelRatio);
            const canvas = document.getElementById('canvas');
            canvas.parentElement.insertBefore(renderer.domElement, canvas);
            canvas.style.display = 'none';

            // Setup controls
            controls = new THREE.OrbitControls(camera, renderer.domElement);
            controls.target.set(0, 1, 0);
            controls.autoRotate = false;
            controls.enableDamping = true;
            controls.dampingFactor = 0.05;
            controls.update();

            // Add lights
            const light1 = new THREE.DirectionalLight(0xffffff, 0.8);
            light1.position.set(5, 10, 7);
            scene.add(light1);

            const light2 = new THREE.AmbientLight(0xffffff, 0.5);
            scene.add(light2);

            // Add floor
            const floorGeometry = new THREE.PlaneGeometry(10, 10);
            const floorMaterial = new THREE.MeshPhongMaterial({
                color: 0x444444,
                wireframe: false,
                side: THREE.DoubleSide
            });
            const floor = new THREE.Mesh(floorGeometry, floorMaterial);
            floor.rotation.x = -Math.PI / 2;
            floor.position.y = 0;
            floor.receiveShadow = true;
           // scene.add(floor);

            // Add grid helper
            const gridHelper = new THREE.GridHelper(10, 20, 0x666666, 0x444444);
            gridHelper.position.y = 0.01;
            scene.add(gridHelper);

            // Initialize person list
            updatePersonList();

            // Start animation loop
            animate();
        }

        function updatePersonList() {
            const list = document.getElementById('personList');
            list.innerHTML = '';
            persons.forEach(person => {
                const item = document.createElement('div');
                item.className = 'person-item';
                item.textContent = person;
                item.onclick = () => selectPerson(person);
                list.appendChild(item);
            });
        }

        function selectPerson(personName) {
            currentPerson = personName;
            currentFrameIndex = 0;
            loadPersonFrames();
            updateActiveHighlight();
            // Start preloading all frames after a short delay
            setTimeout(() => preloadAllFrames(), 500);
        }

        function updateActiveHighlight() {
            document.querySelectorAll('.person-item').forEach(item => {
                item.classList.toggle('active', item.textContent === currentPerson);
            });
        }

        function preloadAllFrames() {
            if (!currentPerson) return;
            const maxFrames = personFrameCounts[currentPerson] || 1;
            if (maxFrames <= 1) return;
            
            isPreloadingAll = true;
            document.getElementById('loadingOverlay').classList.remove('hidden');
            
            // Play at 30x speed through all frames to preload
            playbackSpeed = 30;
            isPlaying = true;
            document.getElementById('playBtn').textContent = '⏸ Pause';
        }
        
        function checkPreloadingComplete() {
            if (!isPreloadingAll || !currentPerson) return;
            
            const maxFrames = personFrameCounts[currentPerson] || 1;
            let loadedCount = 0;
            
            for (let i = 0; i < maxFrames; i++) {
                const framePath = getFramePath(i);
                if (plyCaches[framePath]) {
                    loadedCount++;
                }
            }
            
            const statusEl = document.getElementById('loadingStatus');
            statusEl.textContent = 'Preloading animation... ' + loadedCount + '/' + maxFrames;
            
            if (loadedCount === maxFrames) {
                // Done preloading, stop playback
                isPreloadingAll = false;
                isPlaying = false;
                playbackSpeed = 0.2;
                document.getElementById('speedLabel').textContent = '0.2x';
                document.getElementById('playBtn').textContent = '▶ Play';
                document.getElementById('loadingOverlay').classList.add('hidden');
                currentFrameIndex = 0;
                loadFrame(0);
            }
        }

        function discoverFrameCount() {
            if (!currentPerson) return Promise.resolve(1);
            
            // Try to load a manifest file first (if it exists)
            return fetch(currentPerson + '/manifest.json', { cache: 'no-store' })
                .then(r => {
                    if (r.ok) return r.json().then(m => m.frameCount || 1);
                    throw new Error('No manifest');
                })
                .catch(() => {
                    // Fallback: probe for frames by testing a large range efficiently
                    let maxFrame = 0;
                    const checkFrame = (i) => {
                        const frameName = currentPerson + '_frame_' + String(i).padStart(6, '0') + '.ply';
                        const framePath = currentPerson + '/' + frameName;
                        return fetch(framePath, { method: 'HEAD', cache: 'no-store' })
                            .then(r => r.ok)
                            .catch(() => false);
                    };
                    
                    // Binary-search style: test logarithmic points first
                    let checkPromises = [];
                    const testPoints = [10, 50, 100, 200, 500, 1000, 2000, 5000];
                    
                    testPoints.forEach(i => {
                        checkPromises.push(
                            checkFrame(i).then(exists => {
                                if (exists) maxFrame = Math.max(maxFrame, i);
                            })
                        );
                    });
                    
                    return Promise.all(checkPromises).then(() => {
                        // Once we know approximate range, fill in more carefully
                        if (maxFrame > 0) {
                            let moreChecks = [];
                            for (let i = Math.max(0, maxFrame - 100); i <= maxFrame + 100; i += 1) {
                                moreChecks.push(
                                    checkFrame(i).then(exists => {
                                        if (exists) maxFrame = Math.max(maxFrame, i + 1);
                                    })
                                );
                            }
                            return Promise.all(moreChecks).then(() => maxFrame);
                        }
                        return maxFrame || 1;
                    });
                });
        }

        function loadPersonFrames() {
            if (!currentPerson) return;
            
            // Load animation metadata and frame reference
            Promise.all([
                fetch(currentPerson + '/animation_metadata.json', { cache: 'no-store' }).then(r => r.json()).catch(() => null),
                fetch(currentPerson + '/frame_reference.json', { cache: 'no-store' }).then(r => r.json()).catch(() => null)
            ]).then(([animMeta, frameMeta]) => {
                animationMetadata = animMeta;
                if (animMeta) {
                    frameTime = animMeta.animation.frame_duration_ms / 1000;
                    personFrameCounts[currentPerson] = animMeta.animation.total_frames;
                } else {
                    // Fallback: probe for frames
                    discoverFrameCount().then(frameCount => {
                        personFrameCounts[currentPerson] = frameCount;
                    });
                }
                
                if (frameMeta && frameMeta.frames) {
                    frameMetadata = {};
                    frameMeta.frames.forEach((frame, idx) => {
                        frameMetadata[idx] = frame;
                    });
                }
                
                updateFrameSlider();
                loadFrame(0);
            });
        }

        function updateFrameSlider() {
            if (!currentPerson) return;
            const maxFrames = personFrameCounts[currentPerson] || 1;
            document.getElementById('frameSlider').max = Math.max(0, maxFrames - 1);
        }

        function getFramePath(frameIdx) {
            if (!currentPerson) return '';
            const frameName = currentPerson + '_frame_' + String(frameIdx).padStart(6, '0');
            return currentPerson + '/' + frameName + '.obj';
        }
        
        function preloadFrame(frameIdx) {
            if (loadingQueue.size >= MAX_CONCURRENT_LOADS || preloadedFrames.has(frameIdx)) return;
            
            const framePath = getFramePath(frameIdx);
            if (plyCaches[framePath]) return; // Already cached
            
            preloadedFrames.add(frameIdx);
            loadingQueue.add(framePath);
            
            objLoader.load(
                framePath,
                (object) => {
                    plyCaches[framePath] = object;
                    loadingQueue.delete(framePath);
                },
                undefined,
                (error) => {
                    console.warn('Failed to preload frame:', framePath);
                    loadingQueue.delete(framePath);
                }
            );
        }
        
        function preloadFrames() {
            if (!isPlaying || !currentPerson) return;
            
            const maxFrames = personFrameCounts[currentPerson] || 1;
            
            // Queue next N frames for preloading
            for (let i = 1; i <= PRELOAD_DISTANCE; i++) {
                const frameIdx = currentFrameIndex + i;
                if (frameIdx < maxFrames) {
                    if (!plyCaches[getFramePath(frameIdx)] && !preloadedFrames.has(frameIdx)) {
                        preloadFrame(frameIdx);
                    }
                }
            }
        }

        function loadFrame(frameIndex) {
            if (!currentPerson) return;

            const maxFrames = personFrameCounts[currentPerson] || 1;
            currentFrameIndex = Math.max(0, Math.min(frameIndex, maxFrames - 1));
            const framePath = getFramePath(currentFrameIndex);

            // Cache check
            if (!plyCaches[framePath]) {
                if (!loadingQueue.has(framePath)) {
                    loadingQueue.add(framePath);
                    objLoader.load(framePath, (object) => {
                        plyCaches[framePath] = object;
                        if (currentFrameIndex === frameIndex) {
                            displayFrame(object);
                        }
                        loadingQueue.delete(framePath);
                    }, undefined, (error) => {
                        console.error('Error loading OBJ:', error);
                        loadingQueue.delete(framePath);
                    });
                }
            } else {
                displayFrame(plyCaches[framePath]);
            }

            updateFrameLabel();
            document.getElementById('frameSlider').value = currentFrameIndex;
            preloadFrames();
        }

        function displayFrame(object) {
            if (currentMesh) {
                scene.remove(currentMesh);
            }

            // OBJLoader returns an Object3D/Group
            if (object.isGroup) {
                // It's a group from OBJLoader
                currentMesh = object;
                // Apply material to all children
                object.traverse((child) => {
                    if (child.isMesh) {
                        child.material = new THREE.MeshPhongMaterial({
                            color: 0xccaa88,
                            shininess: 50,
                            wireframe: false
                        });
                    }
                });
            } else {
                // It's a geometry (shouldn't happen with OBJLoader, but handle it)
                object.computeVertexNormals();
                const material = new THREE.MeshPhongMaterial({
                    color: 0xccaa88,
                    shininess: 50,
                    wireframe: false
                });
                currentMesh = new THREE.Mesh(object, material);
            }
            
            // Flip model right-side up (180° X rotation) and scale down
            currentMesh.rotation.x = Math.PI;
            currentMesh.scale.set(0.5, 0.5, 0.5);
            
            // Apply position from frame metadata
            let posX = 0, posY = 0, posZ = 0;
            if (frameMetadata[currentFrameIndex]) {
                const frame = frameMetadata[currentFrameIndex];
                if (frame.bounds && frame.bounds.center) {
                    posX = frame.bounds.center[0] || 0;
                    posY = frame.bounds.center[1] || 0;
                    posZ = frame.bounds.center[2] || 0;
                } else if (frame.bounds) {
                    // Calculate center from bounds
                    const bounds = frame.bounds;
                    if (bounds.min && bounds.max) {
                        posX = (bounds.min[0] + bounds.max[0]) / 2;
                        posY = (bounds.min[1] + bounds.max[1]) / 2;
                        posZ = (bounds.min[2] + bounds.max[2]) / 2;
                    }
                }
            }
            
            // Swap Y and Z axes to correct coordinate system mismatch
           // currentMesh.position.set(posY, posX, -posZ);
            scene.add(currentMesh);
        }

        function updateFrameLabel() {
            const maxFrames = personFrameCounts[currentPerson] || 1;
            document.getElementById('frameLabel').textContent = currentFrameIndex + '/' + (maxFrames - 1);
        }

        function setFrame(value) {
            loadFrame(parseInt(value));
            isPlaying = false;
            document.getElementById('playBtn').textContent = '▶ Play';
        }

        function togglePlayPause() {
            isPlaying = !isPlaying;
            const video = document.getElementById('syncVideo');
            if (isPlaying) {
                video.play();
                document.getElementById('playBtn').textContent = '⏸ Pause';
            } else {
                video.pause();
                document.getElementById('playBtn').textContent = '▶ Play';
            }
        }

        function setSpeed(value) {
            playbackSpeed = parseFloat(value);
            document.getElementById('speedLabel').textContent = playbackSpeed.toFixed(1) + 'x';
        }

        function resetCamera() {
            camera.position.set(0, 1, 2);
            camera.lookAt(0, 1, 0);
            controls.target.set(0, 1, 0);
            controls.update();
        }

        function animate() {
            requestAnimationFrame(animate);
            
            // Check if preloading is complete
            checkPreloadingComplete();

            if (isPlaying && currentPerson) {
                deltaTime += frameTime * playbackSpeed;
                if (deltaTime >= frameTime) {
                    const nextFrame = currentFrameIndex + 1;
                    const maxFrames = personFrameCounts[currentPerson] || 1;
                    if (nextFrame < maxFrames) {
                        loadFrame(nextFrame);
                        syncAnimationToVideo();
                    } else {
                        isPlaying = false;
                        document.getElementById('playBtn').textContent = '▶ Play';
                        document.getElementById('syncVideo').pause();
                    }
                    deltaTime = 0;
                }
            }

            controls.update();
            renderer.render(scene, camera);
        }

        function syncVideoToAnimation() {
            const video = document.getElementById('syncVideo');
            if (!video.paused) return; // Only sync if video is paused
            
            if (!currentPerson) return;
            const maxFrames = personFrameCounts[currentPerson] || 1;
            const duration = video.duration || 1;
            const videoTime = video.currentTime;
            const expectedFrame = Math.floor((videoTime / duration) * maxFrames);
            
            if (Math.abs(expectedFrame - currentFrameIndex) > 0.5) {
                loadFrame(expectedFrame);
            }
        }

        function syncAnimationToVideo() {
            const video = document.getElementById('syncVideo');
            if (!currentPerson || !isPlaying) return;
            
            const maxFrames = personFrameCounts[currentPerson] || 1;
            const duration = video.duration || 1;
            const expectedTime = (currentFrameIndex / maxFrames) * duration;
            
            if (Math.abs(video.currentTime - expectedTime) > 0.05) {
                video.currentTime = expectedTime;
            }
        }

        // Initialize on load
        window.addEventListener('load', () => {
            initThreeJS();
            if (persons.length > 0) {
                selectPerson(persons[0]);
            }
            
            // Setup video event listeners
            const video = document.getElementById('syncVideo');
            video.addEventListener('play', () => {
                if (!isPlaying) {
                    isPlaying = true;
                    document.getElementById('playBtn').textContent = '⏸ Pause';
                }
            });
            video.addEventListener('pause', () => {
                if (isPlaying) {
                    isPlaying = false;
                    document.getElementById('playBtn').textContent = '▶ Play';
                }
            });
            video.addEventListener('seeking', syncVideoToAnimation);
        });

        // Handle window resize
        window.addEventListener('resize', () => {
            const viewerDiv = document.getElementById('viewer');
            const width = viewerDiv.clientWidth;
            const height = viewerDiv.clientHeight - 100;
            camera.aspect = width / height;
            camera.updateProjectionMatrix();
            renderer.setSize(width, height);
        });
    </script>
</body>
</html>
